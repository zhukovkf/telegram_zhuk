name: Publish Telegram Post

on:
  schedule:
    # 09:00 по Москве (UTC+3), через день: 8,10,12,14,16,18,20 июля 2026 —
    # даты под текущий контент-план на 2 недели. cron не умеет "каждые 2 дня"
    # сам по себе (*/2 в day-of-month считает от 1 числа и даёт нечётные дни),
    # поэтому даты перечислены явно. Когда контент-план продлится дальше —
    # обновите эту строку под новые даты.
    - cron: '0 6 8,10,12,14,16,18,20 7 *'
  workflow_dispatch: {}        # запуск вручную: Actions -> Publish Telegram Post -> Run workflow

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publish next post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ vars.TELEGRAM_CHANNEL }}
        run: python3 publish_next.py

      - name: Save queue changes
        run: |
          git config user.name "telegram-autopost-bot"
          git config user.email "actions@users.noreply.github.com"
          git add queue published
          git diff --staged --quiet || git commit -m "Publish next post"
          git push
