name: Publish Telegram Post

on:
  schedule:
    - cron: '0 6 * * 1,3,5'   # 09:00 по Москве (UTC+3) в пн/ср/пт
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publish next post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ vars.TELEGRAM_CHANNEL }}
        run: python3 publish_next.py

      - name: Save queue changes
        run: |
          git config user.name "telegram-autopost-bot"
          git config user.email "actions@users.noreply.github.com"
          git add queue published
          git diff --staged --quiet || git commit -m "Publish next post"
          git push
