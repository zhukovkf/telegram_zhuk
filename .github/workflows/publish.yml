name: Publish Telegram Post

on:
  schedule:
    - cron: '0 6 * * *'   # проверка каждый день в 09:00 по Москве (UTC+3); публикует, только если прошло 2 дня с прошлого поста
  workflow_dispatch: {}    # запуск вручную кнопкой в GitHub

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publish next post if due
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python3 publish_next.py

      - name: Save queue and state changes
        run: |
          git config user.name "telegram-autopost-bot"
          git config user.email "actions@users.noreply.github.com"
          git add queue published state.json
          git diff --staged --quiet || git commit -m "Publish next post"
          git push
